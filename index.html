<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的主页</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --green: #4ade80;
    --border: #334155;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ---- 头像 + 欢迎 ---- */
  .hero {
    text-align: center;
    padding: 30px 0 10px;
  }
  .hero .avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 16px;
    box-shadow: 0 0 30px rgba(56,189,248,0.3);
  }
  .hero h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .hero .sub {
    color: var(--muted);
    font-size: 14px;
  }

  /* ---- 卡片 ---- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: transform 0.2s;
  }
  .card:active { transform: scale(0.98); }
  .card h2 {
    font-size: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  /* ---- 时钟 ---- */
  .clock {
    text-align: center;
    padding: 24px;
  }
  .clock .time {
    font-size: 56px;
    font-weight: 300;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    font-family: "SF Mono", "JetBrains Mono", "Consolas", monospace;
  }
  .clock .date {
    color: var(--muted);
    font-size: 14px;
    margin-top: 4px;
  }

  /* ---- 快捷链接 ---- */
  .links {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .link-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 8px;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
  }
  .link-item:hover { border-color: var(--accent); }
  .link-item .icon { font-size: 28px; margin-bottom: 6px; }
  .link-item .label { font-size: 12px; color: var(--muted); }

  /* ---- 状态标签 ---- */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(74,222,128,0.15);
    color: var(--green);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
  }
  .status-badge::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ---- 模态框 ---- */
  .modal-overlay {
    display: none; position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.6); z-index:1000;
    align-items: center; justify-content: center; padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal-dialog {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
    width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity:0; transform: translateY(20px) scale(0.96); }
    to { opacity:1; transform: translateY(0) scale(1); }
  }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .modal-title { font-size:18px; font-weight:600; }
  .modal-close { background:none; border:none; color:var(--muted); font-size:24px; cursor:pointer; padding:4px 8px; border-radius:8px; }
  .modal-close:hover { background:rgba(255,255,255,0.1); }

  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; font-weight:500; }
  .modal-field input, .modal-field textarea, .modal-field select {
    width:100%; padding:10px 12px; background:var(--bg);
    border:1px solid var(--border); border-radius:10px;
    color:var(--text); font-size:14px; outline:none; transition:border-color 0.2s;
  }
  .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { border-color:var(--accent); }
  .modal-field textarea { min-height:80px; resize:vertical; }
  .modal-field select { appearance:none; cursor:pointer; }

  .modal-execute {
    width:100%; padding:12px; margin-top:8px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border:none; border-radius:10px; color:#fff; font-size:15px;
    font-weight:600; cursor:pointer; transition:opacity 0.2s;
  }
  .modal-execute:hover { opacity:0.9; }
  .modal-execute:active { transform:scale(0.98); }

  .modal-result { margin-top:16px; padding:14px; background:var(--bg); border-radius:10px; }
  .result-label { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .result-value { font-size:18px; font-weight:600; color:var(--accent); word-break:break-all; }
  .result-error { font-size:14px; color:#f87171; }

  @media (max-width: 480px) {
    .modal-overlay { align-items:flex-end; padding:0; }
    .modal-dialog { max-width:100%; border-radius:16px 16px 0 0; max-height:85vh; animation:slideUp 0.3s ease; }
    @keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  }

  .feature-card { cursor:pointer; }

  /* ---- footer ---- */
  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px 0;
  }
</style>
</head>
<body>

<div class="container">

  <!-- 头像区 -->
  <div class="hero">
    <div class="avatar">👋</div>
    <h1>你好！</h1>
    <p class="sub">欢迎来到我的主页</p>
  </div>

  <!-- 时钟 -->
  <div class="card clock">
    <h2>🕐 当前时间</h2>
    <div class="time" id="time">--:--:--</div>
    <div class="date" id="date">----年--月--日 星期-</div>
  </div>

  <!-- 快速链接 -->
  <div class="card">
    <h2>🔗 常用链接</h2>
    <div class="links">
      <a class="link-item" href="https://github.com" target="_blank">
        <div class="icon">🐙</div>
        <div class="label">GitHub</div>
      </a>
      <a class="link-item" href="https://www.google.com" target="_blank">
        <div class="icon">🔍</div>
        <div class="label">搜索</div>
      </a>
      <a class="link-item" href="https://www.youtube.com" target="_blank">
        <div class="icon">▶️</div>
        <div class="label">视频</div>
      </a>
    </div>
  </div>

  <!-- 功能 -->
  <div class="card" id="features-section" style="display:none;">
    <h2>🧩 功能</h2>
    <div class="links" id="features-container"></div>
  </div>

  <!-- 状态 -->
  <div class="card">
    <h2>📡 状态</h2>
    <p style="display:flex;align-items:center;justify-content:space-between;">
      <span style="color:var(--muted);">页面状态</span>
      <span class="status-badge">在线</span>
    </p>
    <p style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;">
      <span style="color:var(--muted);">访问来源</span>
      <span style="font-size:13px;" id="device">--</span>
    </p>
  </div>

  <div class="footer">
    Powered by GitHub Pages
  </div>

</div>

<!-- 功能模态框 -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-dialog">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">功能</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div id="modal-inputs"></div>
    <div id="modal-execute-wrap">
      <button class="modal-execute" onclick="executeFeature()">执行</button>
    </div>
    <div class="modal-result" id="modal-result"></div>
  </div>
</div>

<script>
  // 实时时钟
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('time').textContent = h + ':' + m + ':' + s;

    const days = ['日','一','二','三','四','五','六'];
    const y = now.getFullYear();
    const mo = now.getMonth() + 1;
    const d = now.getDate();
    const day = days[now.getDay()];
    document.getElementById('date').textContent = y + '年' + mo + '月' + d + '日 星期' + day;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // 设备检测
  const ua = navigator.userAgent;
  const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(ua);
  document.getElementById('device').textContent = isMobile ? '📱 手机' : '💻 电脑';

  // =============================================
  // 功能系统
  // =============================================
  var FEATURES = [
    // BMI计算
    {
      id: 'bmi',
      name: 'BMI计算',
      icon: '⚖️',
      description: '计算身体质量指数',
      inputs: [
        { id: 'weight', label: '体重 (kg)', type: 'number', placeholder: '例如 70' },
        { id: 'height', label: '身高 (cm)', type: 'number', placeholder: '例如 175' }
      ],
      handler: function(values) { var h = values.height / 100; var bmi = values.weight / (h * h); var tips = ''; if (bmi < 18.5) tips = ' (偏瘦)'; else if (bmi < 24) tips = ' (正常)'; else if (bmi < 28) tips = ' (偏胖)'; else tips = ' (肥胖)'; return { type: 'text', value: bmi.toFixed(1) + tips }; },
      resultLabel: 'BMI 指数'
    },
    // <<<FEATURES>>>
  ];

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderFeatures() {
    var container = document.getElementById('features-container');
    if (!container) return;
    var section = document.getElementById('features-section');
    if (FEATURES.length === 0) {
      if (section) section.style.display = 'none';
      return;
    }
    if (section) section.style.display = 'block';
    container.innerHTML = '';
    for (var i = 0; i < FEATURES.length; i++) {
      var f = FEATURES[i];
      var card = document.createElement('div');
      card.className = 'link-item feature-card';
      card.setAttribute('data-feature-id', f.id);
      card.onclick = (function(id){ return function(){ openFeature(id); }; })(f.id);
      card.innerHTML = '<div class="icon">' + f.icon + '</div><div class="label">' + escHtml(f.name) + '</div>';
      container.appendChild(card);
    }
  }

  function openFeature(featureId) {
    var feature = null;
    for (var i = 0; i < FEATURES.length; i++) {
      if (FEATURES[i].id === featureId) { feature = FEATURES[i]; break; }
    }
    if (!feature) return;

    var overlay = document.getElementById('modal-overlay');
    document.getElementById('modal-title').textContent = feature.icon + ' ' + feature.name;
    document.getElementById('modal-result').innerHTML = '';

    var html = '';
    if (feature.inputs && feature.inputs.length > 0) {
      for (var j = 0; j < feature.inputs.length; j++) {
        var inp = feature.inputs[j];
        html += '<div class="modal-field"><label for="input-' + inp.id + '">' + escHtml(inp.label) + '</label>';
        if (inp.type === 'textarea') {
          html += '<textarea id="input-' + inp.id + '" placeholder="' + escHtml(inp.placeholder || '') + '"></textarea>';
        } else if (inp.type === 'select' && inp.options) {
          html += '<select id="input-' + inp.id + '">';
          for (var k = 0; k < inp.options.length; k++) {
            html += '<option value="' + escHtml(inp.options[k]) + '">' + escHtml(inp.options[k]) + '</option>';
          }
          html += '</select>';
        } else {
          html += '<input type="' + (inp.type === 'number' ? 'number' : 'text') + '" id="input-' + inp.id + '" placeholder="' + escHtml(inp.placeholder || '') + '">';
        }
        html += '</div>';
      }
      document.getElementById('modal-execute-wrap').style.display = 'block';
    } else {
      document.getElementById('modal-execute-wrap').style.display = 'none';
    }
    document.getElementById('modal-inputs').innerHTML = html;
    overlay.dataset.featureId = featureId;
    overlay.classList.add('show');

    // 清理之前的定时器
    if (overlay._intervals) {
      for (var li = 0; li < overlay._intervals.length; li++) {
        clearInterval(overlay._intervals[li]);
      }
      overlay._intervals = null;
    }
  }

  function executeFeature() {
    var overlay = document.getElementById('modal-overlay');
    var featureId = overlay.dataset.featureId;
    var feature = null;
    for (var i = 0; i < FEATURES.length; i++) {
      if (FEATURES[i].id === featureId) { feature = FEATURES[i]; break; }
    }
    if (!feature) return;

    var values = {};
    if (feature.inputs) {
      for (var j = 0; j < feature.inputs.length; j++) {
        var inp = feature.inputs[j];
        var el = document.getElementById('input-' + inp.id);
        if (el) {
          values[inp.id] = inp.type === 'number' ? parseFloat(el.value) || 0 : el.value;
        }
      }
    }

    var resultEl = document.getElementById('modal-result');
    try {
      var result = feature.handler(values);
      resultEl.innerHTML = '<div class="result-label">' + escHtml(feature.resultLabel || '结果') + '</div>' +
        '<div class="result-value">' + (result.type === 'html' ? result.value : escHtml(result.value)) + '</div>';
    } catch (e) {
      resultEl.innerHTML = '<div class="result-error">' + escHtml(e.message || '执行出错') + '</div>';
    }
  }

  function closeModal() {
    var overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('show');
    if (overlay._intervals) {
      for (var i = 0; i < overlay._intervals.length; i++) {
        clearInterval(overlay._intervals[i]);
      }
      overlay._intervals = null;
    }
  }

  // 初始化
  document.addEventListener('DOMContentLoaded', function() {
    var overlay = document.getElementById('modal-overlay');
    if (overlay) {
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) closeModal();
      });
    }
    renderFeatures();
  });
</script>

</body>
</html>
